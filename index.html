<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" type="text/css">
    <title>home</title>
    <style>
        body {
            font-family: Comic Sans MS, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .search-bar {
            text-align: center;
            margin-bottom: 20px;
        }
        .search-bar input {
            width: 50%;
            padding: 10px;
            font-weight: bold;
            font-size: 20px;
            font-family: Comic Sans MS, sans-serif;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        .itemlist {
            list-style-type: none;
            padding: 0px 50px;
        }
        .itemlist li {
            background: #ffffff;
            margin: 10px 0;
            padding: 10px 15px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .itemlist li:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }
        .itemlist li a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
            font-size: 25px;
        }
        .itemlist li a:hover {
            text-decoration: underline;
        }
    </style>
  </head>
  <body>
    <h1 style="text-align: center;">lateeagle64</h1>
    <h2 style="text-align: center;">[0.1.0]</h2>

    <p style="text-align: center;">email me for suggestions: lateeagle64@gmail.com</p>
    
    <h3 style="text-align: center;">games</h3>

    <div class="search-bar">
        <input type="text" id="search-input" placeholder="search for games">
    </div>

    <ul class="itemlist" id="links-list"></ul>

    <script>
        let allLinks = [];

        fetch('games.js')
            .then(response => response.json())
            .then(data => {
                const linksList = document.getElementById('links-list');
                allLinks = data.links;
                allLinks.forEach(link => {
                    const listItem = document.createElement('li');
                    listItem.className = 'active';
                    const anchor = document.createElement('a');
                    anchor.href = link.url;
                    anchor.target = '_blank';
                    anchor.textContent = `${link.name} (${link.url})`;
                    listItem.appendChild(anchor);
                    linksList.appendChild(listItem);
                });
            })
            .catch(error => console.error('Error loading the JSON file:', error));

        document.getElementById('search-input').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const linksList = document.getElementById('links-list');
            linksList.innerHTML = '';
            allLinks
                .filter(link => link.name.toLowerCase().includes(searchTerm))
                .forEach(link => {
                    const listItem = document.createElement('li');
                    listItem.className = 'active';
                    const anchor = document.createElement('a');
                    anchor.href = link.url;
                    anchor.target = '_blank';
                    anchor.textContent = `${link.name} (${link.url})`;
                    listItem.appendChild(anchor);
                    linksList.appendChild(listItem);
                });
        });
    </script>

    <body>
        <section>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </section>
</body>
</html>
