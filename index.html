<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" type="text/css">
    <link href="games.json-" rel="stylesheet" type="text/json">
    
    <title>lateeagle64</title>
    
    <style>
        body {
            font-family: Comic Sans MS, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .itemlist {
            list-style-type: none;
            padding: 0px 50px;
        }
        .itemlist li {
            background: #ffffff;
            margin: 10px 0;
            padding: 10px 15px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .itemlist li:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }
        .itemlist li a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
            font-size: 25px;
        }
        .itemlist li a:hover {
            text-decoration: underline;
        }
    </style>
  </head>
  
  <body>
    <h1 style="text-align: center;">lateeagle64</h1>
    <h2 style="text-align: center;">[0.1.0]</h2>

    <h3 style="text-align: center;">games</h1>
    <ul class="itemlist" id="links-list"></ul>

    <script>
        fetch('games.json')
            .then(response => response.json())
            .then(data => {
                const linksList = document.getElementById('links-list');
                data.links.forEach(link => {
                    const listItem = document.createElement('li');
                    listItem.className = 'active';
                    const anchor = document.createElement('a');
                    anchor.href = link.url;
                    anchor.target = '_blank';
                    anchor.textContent = `${link.name} (${link.url})`;
                    listItem.appendChild(anchor);
                    linksList.appendChild(listItem);
                });
            })
            .catch(error => console.error('Error loading the JSON file:', error));
    </script>
  </body>
</html>
