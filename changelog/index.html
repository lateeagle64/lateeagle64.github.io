<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" type="text/css">
    <title>changelog</title>
    <style>
        body {
            font-family: Comic Sans MS, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .back-link {
            text-align: center;
            margin-top: 5px;
        }
        .back-link a {
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 30px;
            font-family: Comic Sans MS, sans-serif;
            text-shadow: 1px 1px 6px #111111;
            text-decoration: underline;
        }
        .version {
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 30px;
            font-family: Comic Sans MS, sans-serif;
            text-shadow: 1px 1px 6px #111111;
            margin-top: 50px;
        }
        .version h2 {
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 30px;
            font-family: Comic Sans MS, sans-serif;
            text-shadow: 1px 1px 6px #111111;
        }
        .changes-list {
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 20px;
            font-family: Comic Sans MS, sans-serif;
            text-shadow: 1px 1px 6px #111111;
            list-style-type: none;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">changelog</h1>

    <div class="back-link">
        <a href="https://lateeagle64.github.io">back</a>
    </div>

    <div id="versions-container"></div>

    <script>
        fetch('https://lateeagle64.github.io/games.js')
            .then(response => response.json())
            .then(data => {
                const versionsContainer = document.getElementById('versions-container');
                
                data.info.versions.forEach(version => {
                    const versionDiv = document.createElement('div');
                    versionDiv.classList.add('version');

                    const versionHeading = document.createElement('h2');
                    versionHeading.textContent = `Version ${version.name}`;

                    const changesList = document.createElement('div');
                    changesList.classList.add('changes-list');

                    version.changes.forEach(change => {
                        const changeItem = document.createElement('p');
                        changeItem.textContent = change;
                        changesList.appendChild(changeItem);
                    });

                    versionDiv.appendChild(versionHeading);
                    versionDiv.appendChild(changesList);

                    versionsContainer.appendChild(versionDiv);
                });
            })
            .catch(error => console.error('Error loading the JSON file:', error));
    </script>
</body>
</html>
